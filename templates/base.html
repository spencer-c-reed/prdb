<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}PRDB — Public Records Database{% endblock %}</title>
    <style>
        :root {
            --bg: #fafafa;
            --text: #1a1a1a;
            --accent: #2563eb;
            --accent-light: #dbeafe;
            --border: #e5e7eb;
            --muted: #6b7280;
            --card-bg: #ffffff;
            --code-bg: #f3f4f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            background: var(--bg);
            line-height: 1.6;
        }
        nav {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
        }
        nav a { color: var(--text); text-decoration: none; font-size: 0.9rem; }
        nav a:hover { color: var(--accent); }
        nav .logo { font-weight: 700; font-size: 1.1rem; }
        main { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
        h1 { font-size: 1.8rem; margin-bottom: 1rem; }
        h2 { font-size: 1.3rem; margin: 1.5rem 0 0.75rem; }
        a { color: var(--accent); }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            background: var(--accent-light);
            color: var(--accent);
        }
        .muted { color: var(--muted); font-size: 0.85rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); }
        th { font-weight: 600; font-size: 0.85rem; color: var(--muted); text-transform: uppercase; }
        .search-box {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .search-box input {
            flex: 1;
            padding: 0.6rem 1rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
        }
        .search-box button {
            padding: 0.6rem 1.5rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
        }
        .search-box button:hover { opacity: 0.9; }
        .pagination { display: flex; gap: 0.5rem; justify-content: center; margin: 2rem 0; }
        .pagination a, .pagination span {
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            text-decoration: none;
            color: var(--text);
            font-size: 0.85rem;
        }
        .pagination .active { background: var(--accent); color: white; border-color: var(--accent); }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }
        .stat-card .number { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .stat-card .label { font-size: 0.85rem; color: var(--muted); }
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav>
        <a href="/" class="logo">PRDB</a>
        <a href="/search">Search</a>
        <a href="/jurisdictions">Jurisdictions</a>
        <a href="/exemptions">Exemptions</a>
        <a href="/agencies">Agencies</a>
        <a href="/templates">Templates</a>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        PRDB — Public Records Request Database. Placeholder name; will be replaced.
    </footer>
</body>
</html>
